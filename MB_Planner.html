<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB Planner</title>

<style>
  :root {
    --fym-bg: #EEF2FF; --fym-text: #3730A3;
    --cs-bg: #F0FDF4;  --cs-text: #166534;
    --hvh-bg: #FFF7ED; --hvh-text: #9A3412;
    --surface: #FFFFFF; --bg: #F8F9FB; --border: #E5E7EB;
    --text: #111827; --muted: #6B7280; --hint: #9CA3AF;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F9FB; color: #111827; font-size: 15px; min-height: 100vh; width: 100%; }

  #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; background: #F8F9FB; color: #111827; width: 100%; }
  #auth-screen h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
  #auth-screen p { color: #6B7280; margin-bottom: 2rem; font-size: 14px; max-width: 320px; }
  #auth-error { color: #DC2626; font-size: 13px; margin-top: 12px; }

  #app { display: none; max-width: 720px; width: 100%; margin: 0 auto; padding: 0 0 80px; background: #F8F9FB; color: #111827; min-height: 100vh; }
  .top-bar { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-size: 20px; font-weight: 600; }
  .user-btn { background: none; border: 1px solid #E5E7EB; border-radius: 20px; padding: 4px 12px; font-size: 13px; color: #6B7280; cursor: pointer; }

  .tabs { display: flex; padding: 12px 20px 0; gap: 4px; border-bottom: 1px solid #E5E7EB; }
  .tab { padding: 8px 16px; font-size: 14px; font-weight: 500; border: none; background: none; color: #6B7280; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; border-radius: 6px 6px 0 0; }
  .tab.active { color: #111827; border-bottom-color: #111827; }

  .filters { display: flex; gap: 6px; padding: 14px 20px 0; flex-wrap: wrap; }
  .vbtn { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: opacity 0.15s; }
  .vbtn.all { background: #F1F5F9; color: #334155; border-color: #CBD5E1; }
  .vbtn.fym { background: #EEF2FF; color: #3730A3; border-color: #C7D2FE; }
  .vbtn.cs  { background: #F0FDF4;  color: #166534;  border-color: #BBF7D0; }
  .vbtn.hvh { background: #FFF7ED; color: #9A3412; border-color: #FED7AA; }
  .vbtn.dim { opacity: 0.35; }

  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 14px 20px; }
  .stat { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 10px; padding: 12px 14px; }
  .stat-num { font-size: 24px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: #6B7280; margin-top: 2px; }

  .sec-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #9CA3AF; padding: 0 20px; margin: 14px 0 6px; }

  .task { display: flex; align-items: flex-start; gap: 10px; padding: 10px 20px; cursor: pointer; border-bottom: 1px solid #E5E7EB; background: #FFFFFF; transition: background 0.1s; }
  .task:first-child { border-top: 1px solid #E5E7EB; }
  .task:hover { background: #F9FAFB; }
  .task.done .task-name { text-decoration: line-through; opacity: 0.45; }
  .chk { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #E5E7EB; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .chk.on { background: #111827; border-color: #111827; }
  .task-name { font-size: 14px; flex: 1; line-height: 1.45; padding-top: 1px; }
  .task-meta { display: flex; gap: 5px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 10px; }
  .badge.fym { background: #EEF2FF; color: #3730A3; }
  .badge.cs  { background: #F0FDF4;  color: #166534; }
  .badge.hvh { background: #FFF7ED; color: #9A3412; }
  .badge.client { background: #F8FAFC; color: #475569; border: 1px solid #E5E7EB; }
  .due-tag { font-size: 11px; color: #9CA3AF; }
  .due-tag.today { color: #DC2626; font-weight: 500; }

  .add-area { padding: 12px 20px; background: #FFFFFF; border-top: 1px solid #E5E7EB; border-bottom: 1px solid #E5E7EB; margin-top: 8px; }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .add-row input, .add-row select { font-size: 13px; padding: 8px 10px; border: 1px solid #E5E7EB; border-radius: 6px; background: #F8F9FB; color: #111827; }
  .add-row input { flex: 1; min-width: 160px; }
  .add-row button { padding: 8px 16px; background: #111827; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .add-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .goals-list { padding: 0 20px; }
  .goal-card { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .goal-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .goal-title { font-size: 15px; font-weight: 500; flex: 1; }
  .goal-pct { font-size: 13px; color: #6B7280; white-space: nowrap; margin-top: 2px; }
  .goal-sub { display: flex; gap: 6px; align-items: center; margin-top: 3px; }
  .goal-due { font-size: 12px; color: #6B7280; }
  .prog-bg { height: 4px; background: #F8F9FB; border-radius: 4px; margin-bottom: 10px; }
  .prog-fill { height: 4px; border-radius: 4px; background: #111827; transition: width 0.3s; }
  .ms-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-top: 1px solid #E5E7EB; cursor: pointer; }
  .ms-dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid #E5E7EB; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .ms-dot.on { background: #111827; border-color: #111827; }
  .ms-text { font-size: 13px; flex: 1; }
  .ms-text.done { text-decoration: line-through; opacity: 0.4; }

  .add-goal-area { padding: 0 20px; margin-top: 12px; }
  .add-goal-form { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 10px; padding: 14px 16px; }
  .add-goal-form h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .form-row { margin-bottom: 10px; }
  .form-row label { display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px; }
  .form-row input, .form-row select { width: 100%; font-size: 13px; padding: 8px 10px; border: 1px solid #E5E7EB; border-radius: 6px; background: #F8F9FB; color: #111827; }
  .ms-inputs { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .ms-input-row { display: flex; gap: 6px; }
  .ms-input-row input { flex: 1; font-size: 13px; padding: 7px 10px; border: 1px solid #E5E7EB; border-radius: 6px; background: #F8F9FB; color: #111827; }
  .ms-input-row button { padding: 7px 10px; background: none; border: 1px solid #E5E7EB; border-radius: 6px; cursor: pointer; font-size: 16px; color: #6B7280; }
  .add-ms-btn { font-size: 13px; color: #6B7280; background: none; border: none; cursor: pointer; padding: 4px 0; }
  .form-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn-save { padding: 9px 18px; background: #111827; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-cancel { padding: 9px 18px; background: none; border: 1px solid #E5E7EB; border-radius: 6px; font-size: 13px; cursor: pointer; color: #6B7280; }
  .add-goal-btn { width: 100%; padding: 11px; font-size: 14px; border: 1.5px dashed #E5E7EB; border-radius: 10px; background: none; color: #6B7280; cursor: pointer; }
  .add-goal-btn:hover { background: #FFFFFF; }

  .status-bar { text-align: center; padding: 10px 20px; font-size: 13px; color: #6B7280; min-height: 36px; }
  .status-bar.error { color: #DC2626; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #E5E7EB; border-top-color: #111827; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 30px 20px; color: #6B7280; font-size: 14px; border-top: 1px solid #E5E7EB; border-bottom: 1px solid #E5E7EB; background: #FFFFFF; }

  @media (max-width: 600px) {
    .stats { gap: 6px; padding: 10px 14px; }
    .task, .filters, .sec-label { padding-left: 14px; padding-right: 14px; }
    .goals-list, .add-goal-area, .add-area { padding-left: 14px; padding-right: 14px; }
  }
</style>
</head>
<body>

<div id="auth-screen">
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="margin-bottom:16px;">
    <rect width="48" height="48" rx="12" fill="#111827"/>
    <path d="M14 24h20M24 14v20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <h1>MB Planner</h1>
  <p>Sign in with your Google account to access your planner</p>
  <button onclick="signIn()" style="display:inline-flex;align-items:center;gap:10px;background:white;border:1px solid #dadce0;border-radius:4px;padding:10px 24px;font-size:15px;font-weight:500;cursor:pointer;color:#3c4043;">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
    Sign in with Google
  </button>
  <div id="auth-error"></div>
</div>

<div id="app">
  <div class="top-bar">
    <h1>MB Planner</h1>
    <button class="user-btn" id="user-btn" onclick="signOut()">Sign out</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('weekly', this)">This week</button>
    <button class="tab" onclick="showTab('goals', this)">Goals</button>
  </div>

  <div id="weekly-view">
    <div class="filters" id="task-filters">
      <button class="vbtn all active" onclick="filterTasks('all',this)">All</button>
      <button class="vbtn fym" onclick="filterTasks('fym',this)">Find Your More</button>
      <button class="vbtn cs" onclick="filterTasks('cs',this)">Create Space</button>
      <button class="vbtn hvh" onclick="filterTasks('hvh',this)">Healing Vine Harbor</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-done">—</div><div class="stat-lbl">Completed</div></div>
      <div class="stat"><div class="stat-num" id="s-left">—</div><div class="stat-lbl">Remaining</div></div>
      <div class="stat"><div class="stat-num" id="s-pct">—</div><div class="stat-lbl">Progress</div></div>
    </div>
    <div class="sec-label">Today</div>
    <div id="today-list"></div>
    <div class="sec-label">This week</div>
    <div id="week-list"></div>
    <div class="add-area">
      <div class="add-row">
        <input type="text" id="new-task-name" placeholder="Add a task..." />
        <select id="new-task-venture">
          <option value="fym">Find Your More</option>
          <option value="cs">Create Space</option>
          <option value="hvh">Healing Vine Harbor</option>
          <option value="client">Client</option>
        </select>
        <select id="new-task-priority">
          <option value="today">Today</option>
          <option value="thisweek">This week</option>
        </select>
        <button id="add-task-btn" onclick="addTask()">Add</button>
      </div>
    </div>
    <div id="task-status" class="status-bar"></div>
  </div>

  <div id="goals-view" style="display:none;">
    <div class="filters" id="goal-filters">
      <button class="vbtn all active" onclick="filterGoals('all',this)">All</button>
      <button class="vbtn fym" onclick="filterGoals('fym',this)">Find Your More</button>
      <button class="vbtn cs" onclick="filterGoals('cs',this)">Create Space</button>
      <button class="vbtn hvh" onclick="filterGoals('hvh',this)">Healing Vine Harbor</button>
    </div>
    <div style="height:10px;"></div>
    <div class="goals-list" id="goals-list"></div>
    <div class="add-goal-area">
      <button class="add-goal-btn" id="show-add-goal" onclick="showAddGoalForm()">+ Add a goal</button>
      <div id="add-goal-form" style="display:none;">
        <div class="add-goal-form">
          <h3>New goal</h3>
          <div class="form-row"><label>Goal</label><input type="text" id="goal-title-input" placeholder="e.g. Launch Create Space Q3 programming" /></div>
          <div class="form-row"><label>Venture</label>
            <select id="goal-venture-input">
              <option value="fym">Find Your More</option>
              <option value="cs">Create Space</option>
              <option value="hvh">Healing Vine Harbor</option>
            </select>
          </div>
          <div class="form-row"><label>Target date</label><input type="text" id="goal-due-input" placeholder="e.g. Dec 2026" /></div>
          <div class="form-row">
            <label>Milestones</label>
            <div class="ms-inputs" id="ms-inputs">
              <div class="ms-input-row"><input type="text" placeholder="First milestone..." /></div>
            </div>
            <button class="add-ms-btn" onclick="addMilestoneInput()">+ Add milestone</button>
          </div>
          <div class="form-actions">
            <button class="btn-save" onclick="saveGoal()">Save goal</button>
            <button class="btn-cancel" onclick="hideAddGoalForm()">Cancel</button>
          </div>
        </div>
      </div>
    </div>
    <div id="goal-status" class="status-bar"></div>
  </div>
</div>

<script>
const SHEET_ID  = '1jj1s-b4Qfi4XWhYav7Hp8YBcjkZwacybQSVvT5WfhmM';
const API_BASE  = 'https://sheets.googleapis.com/v4/spreadsheets';
const CLIENT_ID = '104618786714-02j43hgasrrvon7r9kqg5rvn1f6t9b16.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets';

let accessToken = null;
let tasks = [], goals = [], milestones = [];
let taskFilter = 'all', goalFilter = 'all';

// ── AUTH ─────────────────────────────────────────────────────────────────
const REDIRECT_URI = 'https://createspaceco.github.io/mb-planner/MB_Planner.html';
const AUTH_URL = 'https://accounts.google.com/o/oauth2/v2/auth';

function signIn() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'token',
    scope: SCOPES + ' https://www.googleapis.com/auth/userinfo.profile',
    include_granted_scopes: 'true'
  });
  window.location.href = AUTH_URL + '?' + params.toString();
}

function signOut() {
  accessToken = null;
  sessionStorage.removeItem('mb_gtoken');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

function checkAuth() {
  // Check if returning from OAuth redirect
  const hash = window.location.hash;
  if (hash) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get('access_token');
    if (token) {
      accessToken = token;
      sessionStorage.setItem('mb_gtoken', token);
      window.history.replaceState({}, document.title, window.location.pathname);
      startApp();
      return;
    }
  }
  // Check session storage
  const saved = sessionStorage.getItem('mb_gtoken');
  if (saved) {
    accessToken = saved;
    startApp();
    return;
  }
  // Show sign in
  document.getElementById('auth-screen').style.display = 'flex';
}

async function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v1/userinfo', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (!r.ok) throw new Error('Token invalid');
    const user = await r.json();
    document.getElementById('user-btn').textContent = (user.given_name || 'User') + ' · Sign out';
  } catch(e) {
    sessionStorage.removeItem('mb_gtoken');
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('auth-error').textContent = 'Session expired. Please sign in again.';
    return;
  }
  loadAll();
}

// ── SHEETS API ────────────────────────────────────────────────────────────
async function sheetsGet(range) {
  const r = await fetch(`${API_BASE}/${SHEET_ID}/values/${encodeURIComponent(range)}`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (!r.ok) throw new Error(`Sheets error ${r.status}: ${await r.text()}`);
  return r.json();
}

async function sheetsAppend(range, values) {
  const r = await fetch(`${API_BASE}/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values })
  });
  if (!r.ok) throw new Error(`Append error ${r.status}: ${await r.text()}`);
  return r.json();
}

async function sheetsUpdate(range, values) {
  const r = await fetch(`${API_BASE}/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values })
  });
  if (!r.ok) throw new Error(`Update error ${r.status}: ${await r.text()}`);
  return r.json();
}

// ── DATA ──────────────────────────────────────────────────────────────────
async function loadAll() {
  setStatus('task-status', '<span class="spinner"></span> Loading...');
  try {
    const [tData, gData, mData] = await Promise.all([
      sheetsGet('Tasks!A1:E500'),
      sheetsGet('Goals!A1:D100'),
      sheetsGet('Milestones!A1:D500')
    ]);
    tasks      = parseSheet(tData.values, ['id','name','venture','priority','done']);
    goals      = parseSheet(gData.values, ['id','title','venture','due']);
    milestones = parseSheet(mData.values, ['id','goalId','text','done']);
    setStatus('task-status', '');
    render();
  } catch(e) {
    setStatus('task-status', `Error loading data: ${e.message}`, true);
  }
}

function parseSheet(values, keys) {
  if (!values || values.length < 2) return [];
  return values.slice(1).filter(r => r && r[0]).map(r => {
    const obj = {};
    keys.forEach((k,i) => obj[k] = r[i] !== undefined ? String(r[i]) : '');
    if ('done' in obj) obj.done = obj.done === 'true' || obj.done === 'TRUE';
    return obj;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() { renderTasks(); renderGoals(); }

function ventureName(v) {
  return {fym:'Find Your More', cs:'Create Space', hvh:'Healing Vine Harbor', client:'Client'}[v] || v;
}

function renderTasks() {
  const all    = tasks.filter(t => taskFilter === 'all' || t.venture === taskFilter);
  const todays = all.filter(t => t.priority === 'today');
  const week   = all.filter(t => t.priority === 'thisweek');
  const done   = all.filter(t => t.done).length;
  const pct    = all.length ? Math.round(done/all.length*100) : 0;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = all.length - done;
  document.getElementById('s-pct').textContent  = pct + '%';
  document.getElementById('today-list').innerHTML = taskRows(todays);
  document.getElementById('week-list').innerHTML  = taskRows(week);
}

function taskRows(list) {
  if (!list.length) return '<div class="empty">Nothing here yet</div>';
  return list.map(t => `
    <div class="task ${t.done?'done':''}" onclick="toggleTask('${t.id}')">
      <div class="chk ${t.done?'on':''}">
        ${t.done?'<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
      </div>
      <div style="flex:1;">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          <span class="badge ${t.venture}">${ventureName(t.venture)}</span>
          <span class="due-tag ${t.priority==='today'?'today':''}">${t.priority==='today'?'Due today':'This week'}</span>
        </div>
      </div>
    </div>`).join('');
}

function renderGoals() {
  const list = goals.filter(g => goalFilter === 'all' || g.venture === goalFilter);
  if (!list.length) { document.getElementById('goals-list').innerHTML = '<div class="empty">No goals yet — add one below</div>'; return; }
  document.getElementById('goals-list').innerHTML = list.map(g => {
    const ms   = milestones.filter(m => m.goalId === g.id);
    const done = ms.filter(m => m.done).length;
    const pct  = ms.length ? Math.round(done/ms.length*100) : 0;
    return `<div class="goal-card">
      <div class="goal-top">
        <div style="flex:1;">
          <div class="goal-title">${g.title}</div>
          <div class="goal-sub"><span class="badge ${g.venture}">${ventureName(g.venture)}</span><span class="goal-due">Target: ${g.due}</span></div>
        </div>
        <span class="goal-pct">${pct}%</span>
      </div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
      ${ms.map(m => `
        <div class="ms-row" onclick="toggleMilestone('${m.id}')">
          <div class="ms-dot ${m.done?'on':''}">
            ${m.done?'<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5L7 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
          </div>
          <span class="ms-text ${m.done?'done':''}">${m.text}</span>
        </div>`).join('')}
    </div>`;
  }).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
async function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  renderTasks();
  try {
    const data = await sheetsGet('Tasks!A1:E500');
    const rows = data.values || [];
    for (let i = 1; i < rows.length; i++) {
      if (rows[i][0] === id) {
        await sheetsUpdate(`Tasks!E${i+1}`, [[t.done ? 'true' : 'false']]);
        break;
      }
    }
  } catch(e) { setStatus('task-status', 'Could not save: ' + e.message, true); }
}

async function addTask() {
  const name = document.getElementById('new-task-name').value.trim();
  if (!name) return;
  const venture  = document.getElementById('new-task-venture').value;
  const priority = document.getElementById('new-task-priority').value;
  const id = Date.now().toString();
  tasks.push({ id, name, venture, priority, done: false });
  renderTasks();
  document.getElementById('new-task-name').value = '';
  document.getElementById('add-task-btn').disabled = true;
  setStatus('task-status', '<span class="spinner"></span> Saving...');
  try {
    await sheetsAppend('Tasks!A:E', [[id, name, venture, priority, 'false']]);
    setStatus('task-status', '');
  } catch(e) {
    setStatus('task-status', 'Could not save: ' + e.message, true);
  }
  document.getElementById('add-task-btn').disabled = false;
}

async function toggleMilestone(id) {
  const m = milestones.find(x => x.id === id);
  if (!m) return;
  m.done = !m.done;
  renderGoals();
  try {
    const data = await sheetsGet('Milestones!A1:D500');
    const rows = data.values || [];
    for (let i = 1; i < rows.length; i++) {
      if (rows[i][0] === id) {
        await sheetsUpdate(`Milestones!D${i+1}`, [[m.done ? 'true' : 'false']]);
        break;
      }
    }
  } catch(e) { setStatus('goal-status', 'Could not save: ' + e.message, true); }
}

async function saveGoal() {
  const title = document.getElementById('goal-title-input').value.trim();
  if (!title) return;
  const venture = document.getElementById('goal-venture-input').value;
  const due     = document.getElementById('goal-due-input').value.trim() || 'TBD';
  const gId     = Date.now().toString();
  const msTexts = Array.from(document.querySelectorAll('#ms-inputs input')).map(i => i.value.trim()).filter(Boolean);

  goals.push({ id: gId, title, venture, due });
  msTexts.forEach(text => milestones.push({ id: (Date.now()+Math.random()).toString(), goalId: gId, text, done: false }));
  renderGoals();
  hideAddGoalForm();
  setStatus('goal-status', '<span class="spinner"></span> Saving...');
  try {
    await sheetsAppend('Goals!A:D', [[gId, title, venture, due]]);
    for (const text of msTexts) {
      const mId = (Date.now() + Math.random()).toString();
      await sheetsAppend('Milestones!A:D', [[mId, gId, text, 'false']]);
    }
    setStatus('goal-status', '');
  } catch(e) { setStatus('goal-status', 'Could not save: ' + e.message, true); }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────
function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('weekly-view').style.display = tab === 'weekly' ? '' : 'none';
  document.getElementById('goals-view').style.display  = tab === 'goals'  ? '' : 'none';
}
function filterTasks(v, btn) {
  taskFilter = v;
  document.querySelectorAll('#task-filters .vbtn').forEach(b => { b.classList.remove('active','dim'); b.classList.add(b===btn?'active':'dim'); });
  btn.classList.remove('dim'); btn.classList.add('active');
  renderTasks();
}
function filterGoals(v, btn) {
  goalFilter = v;
  document.querySelectorAll('#goal-filters .vbtn').forEach(b => { b.classList.remove('active','dim'); b.classList.add(b===btn?'active':'dim'); });
  btn.classList.remove('dim'); btn.classList.add('active');
  renderGoals();
}
function showAddGoalForm() {
  document.getElementById('show-add-goal').style.display = 'none';
  document.getElementById('add-goal-form').style.display = '';
}
function hideAddGoalForm() {
  document.getElementById('show-add-goal').style.display = '';
  document.getElementById('add-goal-form').style.display = 'none';
  document.getElementById('goal-title-input').value = '';
  document.getElementById('goal-due-input').value = '';
  document.getElementById('ms-inputs').innerHTML = '<div class="ms-input-row"><input type="text" placeholder="First milestone..." /></div>';
}
function addMilestoneInput() {
  const row = document.createElement('div');
  row.className = 'ms-input-row';
  row.innerHTML = '<input type="text" placeholder="Next milestone..." /><button onclick="this.parentElement.remove()">×</button>';
  document.getElementById('ms-inputs').appendChild(row);
}
function setStatus(id, msg, isError) {
  const el = document.getElementById(id);
  el.innerHTML = msg;
  el.className = 'status-bar' + (isError ? ' error' : '');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('new-task-name').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  checkAuth();
});
</script>
